name: ci/build

on:
    push:
    pull_request:
        paths-ignore:
            - docs/**
            - '**/README.md'

jobs:
    build_conda:
        name: conda (${{ matrix.os }}, ${{ matrix.backend }} ${{ matrix.python-version }})
        runs-on: ${{ matrix.os }}
        defaults:
            run:
                shell: bash -el {0}
        env:
            KERAS_BACKEND: torch
            KERAS_TORCH_DEVICE: CPU
            FACESWAP_BACKEND: ${{ matrix.backend }}
        strategy:
            fail-fast: false
            matrix:
                os: [ubuntu-latest, windows-latest]
                python-version: ['3.11', '3.12', '3.13']
                backend: [nvidia, cpu, rocm, apple-silicon]
                exclude:
                    - os: windows-latest
                      backend: rocm
                    - os: windows-latest
                      backend: apple-silicon
                    - os: ubuntu-latest
                      backend: apple-silicon
        steps:
            - name: Check out repository
              uses: actions/checkout@v5

            - name: Cleanup space
              if: runner.os == 'Linux' && matrix.backend == 'rocm'
              run: |
                  sudo rm -rf "/usr/local/share/boost" "$AGENT_TOOLSDIRECTORY"

            - name: Install Linux GUI dependencies
              if: runner.os == 'Linux'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y \
                    python3-tk \
                    xvfb \
                    xauth \
                    x11-utils \
                    libegl1 \
                    libgl1 \
                    libdbus-1-3 \
                    libxkbcommon-x11-0 \
                    libxcb-cursor0 \
                    libxcb-icccm4 \
                    libxcb-image0 \
                    libxcb-keysyms1 \
                    libxcb-randr0 \
                    libxcb-render-util0 \
                    libxcb-xinerama0 \
                    libxcb-xfixes0

            - name: Set up Conda
              uses: conda-incubator/setup-miniconda@v2
              with:
                  python-version: ${{ matrix.python-version }}
                  miniconda-version: latest
                  auto-update-conda: true
                  activate-environment: faceswap

            - name: Conda info
              run: |
                  conda info
                  conda list

            - name: Install dependencies
              run: |
                  python setup.py --installer --dev --${{ matrix.backend }}
                  python -m pip install --upgrade pip
                  python -m pip install wheel pytest-xvfb types-attrs types-cryptography types-pyOpenSSL

            - name: Lint with flake8
              run: |
                  flake8 . --select=E9,F63,F7,F82 --show-source
                  flake8 . --exit-zero

            - name: MyPy typing
              continue-on-error: true
              run: mypy .

            - name: SysInfo
              run: python -m lib.system.sysinfo

            - name: Unit tests
              if: matrix.backend == 'cpu'
              run: |
                  if [[ "$RUNNER_OS" == "Linux" ]]; then
                    QT_QPA_PLATFORM=xcb xvfb-run -a python -m pytest -v tests/
                  else
                    python -m pytest -v tests/
                  fi

            - name: End-to-end tests
              if: matrix.backend == 'cpu'
              run: |
                  if [[ "$RUNNER_OS" == "Linux" ]]; then
                    QT_QPA_PLATFORM=xcb xvfb-run -a python tests/simple_tests.py
                  else
                    python tests/simple_tests.py
                  fi

    build_linux:
        name: pip (ubuntu-latest, ${{ matrix.backend }} ${{ matrix.python-version }})
        runs-on: ubuntu-latest
        env:
            KERAS_BACKEND: torch
            KERAS_TORCH_DEVICE: CPU
            FACESWAP_BACKEND: ${{ matrix.backend }}
        strategy:
            fail-fast: false
            matrix:
                python-version: ['3.11', '3.12', '3.13']
                backend: [cpu]
        steps:
            - name: Check out repository
              uses: actions/checkout@v5

            - name: Install Linux GUI dependencies
              run: |
                  sudo apt-get update
                  sudo apt-get install -y \
                    python3-tk \
                    xvfb \
                    xauth \
                    x11-utils \
                    libegl1 \
                    libgl1 \
                    libdbus-1-3 \
                    libxkbcommon-x11-0 \
                    libxcb-cursor0 \
                    libxcb-icccm4 \
                    libxcb-image0 \
                    libxcb-keysyms1 \
                    libxcb-randr0 \
                    libxcb-render-util0 \
                    libxcb-xinerama0 \
                    libxcb-xfixes0

            - name: Set up Python ${{ matrix.python-version }}
              uses: actions/setup-python@v6
              with:
                  python-version: ${{ matrix.python-version }}
                  cache: pip
                  cache-dependency-path: |
                      requirements/requirements_base.txt
                      requirements/requirements_${{ matrix.backend }}.txt

            - name: Install dependencies
              run: |
                  python -m pip install --upgrade pip
                  python -m pip install -r requirements/requirements_${{ matrix.backend }}.txt
                  python -m pip install -r requirements/_requirements_dev.txt
                  python -m pip install wheel pytest-xvfb types-attrs types-cryptography types-pyOpenSSL

            - name: Lint with flake8
              run: |
                  flake8 . --select=E9,F63,F7,F82 --show-source
                  flake8 . --exit-zero

            - name: MyPy typing
              continue-on-error: true
              run: mypy .

            - name: SysInfo
              run: python -m lib.system.sysinfo

            - name: Unit tests
              env:
                  QT_QPA_PLATFORM: xcb
              run: xvfb-run -a python -m pytest -v tests/

            - name: End-to-end tests
              env:
                  QT_QPA_PLATFORM: xcb
              run: xvfb-run -a python tests/simple_tests.py

    build_windows:
        name: pip (windows-latest, ${{ matrix.backend }} ${{ matrix.python-version }})
        runs-on: windows-latest
        env:
            KERAS_BACKEND: torch
            KERAS_TORCH_DEVICE: CPU
            FACESWAP_BACKEND: ${{ matrix.backend }}
        strategy:
            fail-fast: false
            matrix:
                python-version: ['3.11', '3.12', '3.13']
                backend: [cpu]
        steps:
            - name: Check out repository
              uses: actions/checkout@v5

            - name: Set up Python ${{ matrix.python-version }}
              uses: actions/setup-python@v6
              with:
                  python-version: ${{ matrix.python-version }}
                  cache: pip
                  cache-dependency-path: |
                      requirements/requirements_base.txt
                      requirements/requirements_${{ matrix.backend }}.txt

            - name: Install dependencies
              run: |
                  python -m pip install --upgrade pip
                  python -m pip install types-attrs types-cryptography types-pyOpenSSL wheel
                  python -m pip install -r requirements/_requirements_dev.txt
                  python -m pip install -r requirements/requirements_${{ matrix.backend }}.txt

            - name: Lint with flake8
              run: |
                  flake8 . --select=E9,F63,F7,F82 --show-source
                  flake8 . --exit-zero

            - name: MyPy typing
              continue-on-error: true
              run: mypy .

            - name: SysInfo
              run: python -m lib.system.sysinfo

            - name: Unit tests
              run: python -m pytest -v tests/

            - name: End-to-end tests
              run: python tests/simple_tests.py
