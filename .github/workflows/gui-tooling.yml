name: GUI tooling

on:
    pull_request:
    push:
        branches:
            - master

jobs:
    gui-tooling:
        runs-on: ubuntu-24.04

        env:
            KERAS_BACKEND: torch
            KERAS_TORCH_DEVICE: CPU
            FACESWAP_BACKEND: cpu
            QT_QPA_PLATFORM: xcb

        steps:
            - name: Check out repository
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: '3.13'
                  cache: pip

            - name: Install system GUI dependencies
              run: |
                  sudo apt-get update
                  sudo apt-get install -y \
                    python3-tk \
                    xvfb \
                    libegl1 \
                    libgl1 \
                    libdbus-1-3 \
                    libxkbcommon-x11-0 \
                    libxcb-cursor0 \
                    libxcb-icccm4 \
                    libxcb-image0 \
                    libxcb-keysyms1 \
                    libxcb-randr0 \
                    libxcb-render-util0 \
                    libxcb-xinerama0 \
                    libxcb-xfixes0 \
                    x11-utils

            - name: Install GUI tooling dependencies
              run: |
                  python -m pip install --upgrade pip
                  python -m pip install -r requirements/_requirements_dev.txt

            - name: Run scoped pre-commit hooks
              run: pre-commit run --all-files

            - name: Run GUI service tests
              run: xvfb-run -a pytest -v tests/lib/gui
