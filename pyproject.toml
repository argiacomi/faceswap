[tool.flake8]
max-line-length = 99
max-complexity=10
statistics = true
count = true
exclude = [".git", "__pycache__"]
per-file-ignores = ["__init__.py:F401"]

[tool.pylint.DESIGN]
min-public-methods = 1
max-args = 10
max-attributes = 10
max-positional-arguments = 10

[tool.pylint.TYPECHECK]
generated-members = ["av", "cv2"]

[tool.ruff]
line-length = 99
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]

[tool.mypy]
python_version = "3.10"
files = ["lib/gui/services", "lib/gui/models"]
mypy_path = "."
show_error_codes = true
warn_redundant_casts = true
warn_return_any = true
warn_unused_ignores = true
no_implicit_optional = true

[[tool.mypy.overrides]]
module = ["lib.utils"]
follow_imports = "skip"

[[tool.mypy.overrides]]
module = [
    "fastcluster.*",
    "ffmpeg.*",
    "ffmpy.*",
    "h5py.*",
    "keras.*",
    "numexpr.*",
    "pexpect.*",
    "pynvml.*",
    "scipy.*",
    "sklearn.*",
    "tensorboard.*",
    "torch.*",
    "torchvision.*",
    "tqdm.*",
    "win32console.*",
    "winpty.*",]
ignore_missing_imports = true

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
filterwarnings = ["ignore::DeprecationWarning:keras.*:"]

[tool.pyright]
reportUnsupportedDunderAll = false