[global]
# OPTIONS THAT APPLY TO ALL EXTRACTION PLUGINS

# Filters out faces below this size. This is a multiplier of the minimum dimension of the frame (i.e.
# 1280x720 = 720). If the original face extract box is smaller than the minimum dimension times this
# multiplier, it is considered a false positive and discarded. Faces which are found to be unusually
# smaller than the frame tend to be misaligned images, except in extreme long-shots. These can be
# usually be safely discarded.
# 
# Select a decimal number between 0.0 and 1.0
# [Default: 0.03]
aligner_min_scale = 0.03

# Filters out faces above this size. This is a multiplier of the minimum dimension of the frame (i.e.
# 1280x720 = 720). If the original face extract box is larger than the minimum dimension times this
# multiplier, it is considered a false positive and discarded. Faces which are found to be unusually
# larger than the frame tend to be misaligned images except in extreme close-ups. These can be usually
# be safely discarded.
# 
# Select a decimal number between 0.0 and 10.0
# [Default: 4.0]
aligner_max_scale = 4.0

# Filters out faces who's landmarks are above this distance from an 'average' face. Values above 15
# tend to be fairly safe. Values above 10 will remove more false positives, but may also filter out
# some faces at extreme angles.
# 
# Select a decimal number between 0.0 and 45.0
# [Default: 40.0]
aligner_distance = 40.0

# Filters out faces who's calculated roll is greater than zero +/- this value in degrees. Aligned
# faces should have a roll value close to zero. Values that are a significant distance from 0 degrees
# tend to be misaligned images. These can usually be safely discarded.
# 
# Select a decimal number between 0.0 and 90.0
# [Default: 0.0]
aligner_roll = 0.0

# Filters out faces where the lowest point of the aligned face's eye or eyebrow is lower than the
# highest point of the aligned face's mouth. Any faces where this occurs are misaligned and can be
# safely discarded.
# 
# Choose from: True, False
# [Default: True]
aligner_features = True

# The size to store masks at. Set to 0 to store at the mask model's output size.
# 
# Select an integer between 0 and 1028
# [Default: 128]
mask_storage_size = 128

# The number of seconds to warmup the model for at each batch size. Higher times will take longer but
# will collect better data.
# 
# Select an integer between 1 and 10
# [Default: 2]
profile_warmup_time = 2

# The number of seconds to profile the pipeline for at each batch size. Higher times will take longer
# but will collect better data.
# 
# Select an integer between 8 and 30
# [Default: 10]
profile_test_time = 10

# The average number of faces expected to be detected in each frame. Throughput of detector plugins
# are dictated by 1 image = 1 sample, however throughput of downstream plugins (align, mask etc) is
# dependant on how many faces are expected to be seen in each frame. This will vary from source to
# source. Setting this correctly will lead to better optimization.
# 
# Select an integer between 1 and 10
# [Default: 2]
profile_num_faces = 2

# The maximum amount of total GPU VRAM to allow Cuda to reserve when searching for optimal batch
# sizes. The closer to 100% the more risk of Out of Memory errors whilst extracting. Anything 90% (85%
# if compiling) or below should be relatively safe for dedicated use, or set the value lower if you
# wish to keep VRAM free for other applications.
# 
# Select an integer between 25 and 95
# [Default: 85]
profile_max_vram = 85

# Whether to save the discovered plugin batch sizes to Faceswap's config for future use.
# 
# Choose from: True, False
# [Default: False]
profile_save_config = False

[align.ensemble]
# LANDMARK ENSEMBLE ALIGNER OPTIONS.
# RUNS AVAILABLE ALIGNER ADAPTERS, CONVERTS PREDICTIONS TO CANONICAL 68-POINT FRAME COORDINATES FOR
# FUSION, THEN RETURNS FACESWAP-COMPATIBLE NORMALIZED LANDMARKS.

# The batch size to use for the ensemble wrapper.
# 
# Select an integer between 1 and 128
# [Default: 8]
batch_size = 8

# Aligner adapters to try when the ensemble plugin is loaded.
# 
# If selecting multiple options then each option should be separated by a space or a comma (e.g.
# item1, item2, item3)
# 
# Choose from: ['hrnet', 'spiga', 'orformer']
# [Default: hrnet, spiga, orformer]
models = orformer, spiga, hrnet

# Square crop scale relative to the detected face box's longest side.
# 
# Select a decimal number between 1.0 and 3.0
# [Default: 1.6]
crop_scale = 1.6

# Fusion strategy for combining adapter predictions. Threshold-aware strategies
# (``static_weighted_hard_drop``, ``static_weighted_downweight``) consume ``outlier_threshold``; other
# strategies ignore it.
# 
# Choose from: ['plain_average', 'static_weighted', 'static_weighted_hard_drop',
# 'static_weighted_downweight', 'weighted_median']
# [Default: static_weighted]
strategy = static_weighted_downweight

# Deprecated compatibility flag retained so existing configs keep their historical hard-drop behavior.
# When ``strategy=static_weighted`` and this is true, the plugin translates the run to
# ``static_weighted_hard_drop`` and logs a deprecation notice. Ignored for every other strategy. New
# configs should set ``strategy`` explicitly and leave this disabled.
# 
# Choose from: True, False
# [Default: True]
reject_outliers = False

# Robust z-score threshold used by threshold-aware strategies. Ignored when the selected strategy does
# not consume a threshold.
# 
# Select a decimal number between 0.5 and 20.0
# [Default: 3.5]
outlier_threshold = 3.5

# Minimum successful adapter predictions required for each face.
# 
# Select an integer between 1 and 3
# [Default: 1]
min_models = 1

# Optional path to a promoted ``best_setup.json`` (#71). When set, the plugin loads the setup and uses
# its strategy / outlier threshold / per-landmark weights for fusion. Leave empty to keep config-
# driven behavior.
# 
# [Default: ]
setup_path = outputs/landmarks/resolver_pipeline/current/candidate_search/best_setup.json

# Static per-landmark weight JSON for production ensemble fusion. This is used by runtime resolver
# configs and by tooling that promotes static weights separately from a full setup artifact.
# 
# [Default: ]
weights_path = outputs/landmarks/resolver_pipeline/current/candidate_search/best_weights.json

# How to consume ``setup_path``. ``off`` ignores it. ``strict`` hard-fails on any incompatible
# artifact. ``fallback`` logs a warning and falls back to the configured ``strategy`` when the
# artifact is unusable. An empty ``setup_path`` implies ``off`` regardless of this value.
# 
# Choose from: ['off', 'strict', 'fallback']
# [Default: off]
setup_mode = strict

# Production runtime resolver policy. ``roll_aware_veto`` applies conservative roll/geometry safety
# checks and then chooses from configured candidate priority. ``learned_quality_v1`` scores geometry-
# valid candidates with ``resolver_scorer_path`` and chooses the lowest predicted risk.
# 
# Choose from: ['roll_aware_veto', 'learned_quality_v1']
# [Default: roll_aware_veto]
resolver_policy = learned_quality_v1

# Path to a ``runtime_resolver_scorer.json`` artifact used when ``resolver_policy`` is
# ``learned_quality_v1``.
# 
# [Default: ]
resolver_scorer_path = outputs/landmarks/resolver_pipeline/current/scorer_training/runtime_resolver_scorer.json

# Enable the production runtime resolver. When on, per-face fusion is routed through
# ``lib.landmarks.ensemble.runtime_resolver`` which builds single-model and fusion candidates,
# estimates pose/geometry buckets, applies v7 bucket priority and vetoes, and emits debug metadata.
# 
# Choose from: True, False
# [Default: False]
use_alignment_resolver = True

# Primary strategy the resolver uses for hard or high-risk faces.
# 
# Choose from: ['plain_average', 'static_weighted', 'static_weighted_hard_drop',
# 'static_weighted_downweight', 'weighted_median']
# [Default: static_weighted_downweight]
hard_case_strategy = static_weighted_downweight

# Secondary hard-case strategy retained in runtime debug/config metadata. The current resolver uses
# the primary hard-case strategy first and falls through to configured fallback when needed.
# 
# Choose from: ['plain_average', 'static_weighted', 'static_weighted_hard_drop',
# 'static_weighted_downweight', 'weighted_median']
# [Default: static_weighted_hard_drop]
secondary_hard_case_strategy = static_weighted_hard_drop

# Inter-model disagreement (px) above which the resolver routes to the hard-case path.
# 
# Select a decimal number between 1.0 and 100.0
# [Default: 12.0]
hard_disagreement_px = 12.0

# Single-model fallback to prefer when the resolver cannot safely use fusion.
# 
# Choose from: ['hrnet', 'spiga', 'orformer']
# [Default: orformer]
fallback_model = orformer

# Strategy used when ``setup_mode=fallback`` and the promoted setup fails to load. Set to
# ``adapter_config`` to fall back to the ``strategy`` field above; any other value names a canonical
# strategy directly.
# 
# Choose from: ['plain_average', 'static_weighted', 'static_weighted_hard_drop',
# 'static_weighted_downweight', 'weighted_median', 'adapter_config']
# [Default: plain_average]
fallback_strategy = plain_average

# Fail fast when configured setup/weights/adapters are unavailable. Disable to allow fallback behavior
# when enough single-model predictions remain available.
# 
# Choose from: True, False
# [Default: False]
strict = True

# Reject fusion candidates whose roll estimate differs from consensus by more than this.
# 
# Select a decimal number between 0.0 and 90.0
# [Default: 15.0]
roll_veto_degrees = 15.0

# Faces with absolute consensus roll above this are treated as hard-case candidates.
# 
# Select a decimal number between 0.0 and 90.0
# [Default: 30.0]
hard_roll_degrees = 30.0

[align.fan]
# FAN ALIGNER OPTIONS.
# FAST ON GPU, SLOW ON CPU. BEST ALIGNER.

# The batch size to use. To a point, higher batch sizes equal better performance, but setting it too
# high can harm performance.
# 
# Select an integer between 1 and 256
# [Default: 16]
batch_size = 16

# Use DARK decoder. A more refined method for obtaining landmarks from generated heatmaps. (Ref:
# https://arxiv.org/abs/1910.06278).
# 
# Choose from: True, False
# [Default: True]
dark_decoder = True

[align.hrnet]
# HRNET ALIGNER OPTIONS.
# TRAINED ON 128K HEAVILY AUGMENTED FACES WITH FULL 360 DEGREE ROTATION. FAST ON GPU, SLOW ON CPU.

# The batch size to use. To a point, higher batch sizes equal better performance, but setting it too
# high can harm performance.
# 
# Select an integer between 1 and 256
# [Default: 16]
batch_size = 16

# Use DARK decoder. A more refined method for obtaining landmarks from generated heatmaps. (Ref:
# https://arxiv.org/abs/1910.06278).
# 
# Choose from: True, False
# [Default: True]
dark_decoder = True

[align.orformer]
# ORFORMER ALIGNER OPTIONS.
# OCCLUSION-ROBUST TRANSFORMER LANDMARK DETECTOR USING THE OFFICIAL WACV 2025 ORFORMER PUBLIC WEIGHTS.
# THE UPSTREAM REPOSITORY DOES NOT PUBLISH AN EXPLICIT CODE OR WEIGHTS LICENSE; USE IN PRIVATE FORKS
# IS DOCUMENTED IN THE PLUGIN WRAPPER.

# The ORFormer model to use. WFLW outputs 98 landmarks and is the better general purpose choice for
# difficult or occluded faces. 300W outputs the standard 68-point landmark set.
# 
# Note: COFW (29 landmarks) is not offered because Faceswap's aligner contract accepts only 68 or 98
# landmarks. MERL-RAV is not an upstream ORFormer checkpoint option.
# 
# Choose from: ['wflw', '300w']
# [Default: wflw]
model = wflw

# Expansion factor applied to the detector bounding box before cropping the face patch fed to
# ORFormer. Upstream ORFormer uses 1.20 for WFLW/300W training, but upstream derives its bbox from
# tight ground-truth landmark extrema, not a face detector box.
# 
# Sensitivity benchmark on 30 curated lapa samples (WFLW model, true NME vs reference landmarks): 1.20
# is best overall (NME 0.396) and best for close-up and hair-visible faces. Performance degrades
# monotonically above 1.20 — reaching 0.416 at 1.60. For clean frontal faces 1.30 is marginally better
# (0.420 vs 0.422), but the difference is within noise. Decision: keep default 1.20.
# 
# Select a decimal number between 1.0 and 2.0
# [Default: 1.2]
crop_scale = 1.2

# The batch size to use. ORFormer runs an integrated HGNet plus transformer heatmap generator, so
# reduce this if you encounter out-of-memory errors.
# 
# Select an integer between 1 and 64
# [Default: 4]
batch_size = 4

[align.spiga]
# SPIGA ALIGNER OPTIONS.
# SHAPE-PRESERVING LANDMARK DETECTOR USING THE UPSTREAM SPIGA 300W-68 AND WFLW-98 PYTORCH MODELS.

# The SPIGA model to use. WFLW outputs 98 landmarks and is the best general-purpose choice for
# difficult, occluded, or profile faces. 300W and MERL-RAV output the standard 68-point landmark set;
# MERL-RAV is trained on real-world face video and may generalise better to in-the-wild footage.
# 
# Choose from: ['wflw', '300w', 'merlrav']
# [Default: merlrav]
model = merlrav

# Expansion factor applied to the detector bounding box before cropping the face patch fed to SPIGA.
# 1.60 matches the upstream SPIGA default.
# 
# Sensitivity benchmark on 30 curated lapa samples (WFLW model, NME vs reference landmarks):
# performance improves steadily from 1.20 (NME 0.454) through 1.40 (0.402) then plateaus — 1.50
# (0.396) and 1.60 (0.397) are essentially tied. Per category: 1.50 is marginally better for close-up
# and hair-visible faces; 1.60 is marginally better for clean frontal faces. The difference is ~0.001
# NME, within noise for small datasets.
# 
# Decision: keep default 1.60 for upstream parity. If you process mostly close-up or profile faces,
# 1.50 may give slightly tighter landmarks. Going below 1.40 measurably hurts accuracy.
# 
# Select a decimal number between 1.0 and 2.0
# [Default: 1.6]
crop_scale = 1.6

# The batch size to use. SPIGA is memory intensive, so reduce this if you encounter out-of-memory
# errors.
# 
# Select an integer between 1 and 64
# [Default: 4]
batch_size = 16

[detect.cv2_dnn]
# CV2 DNN DETECTOR OPTIONS.
# A CPU ONLY EXTRACTOR, IS THE LEAST RELIABLE, BUT USES LEAST RESOURCES AND RUNS FAST ON CPU. USE THIS
# IF NOT USING A GPU AND TIME IS IMPORTANT

# The confidence level at which the detector has successfully found a face.
# Higher levels will be more discriminating, lower levels will have more false positives.
# 
# Select an integer between 25 and 100
# [Default: 50]
confidence = 50

[detect.mtcnn]
# MTCNN DETECTOR OPTIONS.
# FAST ON CPU, FASTER ON GPU. USES FEWER RESOURCES THAN OTHER GPU DETECTORS BUT CAN OFTEN RETURN MORE
# FALSE POSITIVES.

# The minimum size of a face (in pixels) to be accepted as a positive match.
# Lower values use significantly more VRAM and will detect more false positives.
# 
# Select an integer between 20 and 1000
# [Default: 20]
min_size = 20

# The scale factor for the image pyramid.
# 
# Select a decimal number between 0.1 and 0.9
# [Default: 0.709]
scalefactor = 0.709

# The batch size to use. To a point, higher batch sizes equal better performance, but setting it too
# high can harm performance.
# 
# Select an integer between 1 and 256
# [Default: 8]
batch_size = 8

# MTCNN detector still runs fairly quickly on CPU on some setups. Enable CPU mode here to use the CPU
# for this detector to save some VRAM at a speed cost.
# 
# Choose from: True, False
# [Default: True]
cpu = True

# First stage threshold for face detection. This stage obtains face candidates.
# 
# Select a decimal number between 0.1 and 0.9
# [Default: 0.6]
threshold_1 = 0.6

# Second stage threshold for face detection. This stage refines face candidates.
# 
# Select a decimal number between 0.1 and 0.9
# [Default: 0.7]
threshold_2 = 0.7

# Third stage threshold for face detection. This stage further refines face candidates.
# 
# Select a decimal number between 0.1 and 0.9
# [Default: 0.7]
threshold_3 = 0.7

[detect.retinaface]
# RETINAFACE DETECTOR OPTIONS.
# GPU AND CPU VERSIONS AVAILABLE.

# Enable CPU mode here to use the CPU for this detector to save some VRAM at a speed cost.
# 
# Choose from: True, False
# [Default: False]
cpu = False

# The backbone to use. Resnet is heavier but more reliable, MobileNet is light enough to run on CPU.
# 
# Choose from: ['resnet', 'mobilenet']
# [Default: resnet]
backbone = resnet

# The confidence level at which the detector has successfully found a face.
# Higher levels will be more discriminating, lower levels will have more false positives.
# 
# Select an integer between 25 and 100
# [Default: 70]
confidence = 70

# The batch size to use. To a point, higher batch sizes equal better performance, but setting it too
# high can harm performance.
# 
# Select an integer between 1 and 128
# [Default: 4]
batch_size = 4

[detect.s3fd]
# S3FD DETECTOR OPTIONS.
# FAST ON GPU, SLOW ON CPU. CAN DETECT MORE FACES AND FEWER FALSE POSITIVES THAN OTHER GPU DETECTORS,
# BUT IS A LOT MORE RESOURCE INTENSIVE.

# The confidence level at which the detector has successfully found a face.
# Higher levels will be more discriminating, lower levels will have more false positives.
# 
# Select an integer between 25 and 100
# [Default: 70]
confidence = 70

# The batch size to use. To a point, higher batch sizes equal better performance, but setting it too
# high can harm performance.
# 
# Select an integer between 1 and 128
# [Default: 4]
batch_size = 4

[detect.scrfd]
# INSIGHTFACE SCRFD DETECTOR OPTIONS.
# PYTORCH FACE DETECTOR BASED ON INSIGHTFACE SCRFD-10GF AND SCRFD-34GF MODELS.

# Enable CPU mode here to force PyTorch to use the CPU for this detector.
# 
# Choose from: True, False
# [Default: False]
cpu = False

# The SCRFD model to use. 10G is the default high quality detector. 34G is heavier and more accurate,
# especially for difficult faces.
# 
# Choose from: ['10g', '34g']
# [Default: 10g]
model = 10g

# The confidence level at which the detector has successfully found a face.
# Higher levels will be more discriminating, lower levels will have more false positives.
# 
# Select an integer between 25 and 100
# [Default: 50]
confidence = 50

# The batch size to use. To a point, higher batch sizes equal better performance, but setting it too
# high can harm performance.
# 
# Select an integer between 1 and 128
# [Default: 4]
batch_size = 4

# Select the post-processing path for SCRFD detections. 'auto' prefers the Torch path when an
# accelerated device is active and falls back to NumPy otherwise. 'torch' forces the Torch
# decode/threshold/NMS path for debugging. 'numpy' preserves the legacy NumPy implementation.
# 
# Choose from: ['auto', 'torch', 'numpy']
# [Default: auto]
scrfd_postprocess = auto

[identity.t_face]
# TENCENT TFACE IDENTITY RECOGNITION.
# (HTTPS://GITHUB.COM/TENCENT/TFACE)

# The batch size to use. To a point, higher batch sizes equal better performance, but setting it too
# high can harm performance.
# 
# Select an integer between 1 and 256
# [Default: 16]
