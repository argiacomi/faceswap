[align.ensemble]
coordinate_space = frame
crop_scale = 1.6
crop_to_frame = true
debug_metadata = true
debug_metadata_format = jsonl
enabled = true
fallback_model = orformer
fallback_strategy = plain_average
hard_case_strategy = static_weighted_downweight
hard_disagreement_px = 12.0
hard_roll_degrees = 30.0
min_models = 1
models = hrnet,spiga,orformer
normalized_output = true
outlier_threshold = 3.5
production_artifact_root = outputs/landmarks/resolver_pipeline/current/artifacts
production_scorer_path = outputs/landmarks/resolver_pipeline/current/scorer_training/runtime_resolver_scorer.json
production_setup_path = outputs/landmarks/resolver_pipeline/current/candidate_search/best_setup.json
production_weights_path = outputs/landmarks/resolver_pipeline/current/candidate_search/best_weights.json
reject_outliers = false
resolver_policy = learned_quality_v1
resolver_scorer_path = outputs/landmarks/resolver_pipeline/current/scorer_training/runtime_resolver_scorer.json
roll_veto_degrees = 15.0
secondary_hard_case_strategy = static_weighted_hard_drop
setup_mode = strict
setup_path = outputs/landmarks/resolver_pipeline/current/candidate_search/best_setup.json
strategy = static_weighted_downweight
strict = true
use_alignment_resolver = true
weights_path = outputs/landmarks/resolver_pipeline/current/candidate_search/best_weights.json
