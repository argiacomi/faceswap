    end: 22
    closed: false
  left_eyebrow:
    start: 22
    end: 27
    closed: false
  nose:
    start: 27
    end: 36
    closed: false
  right_eye:
    start: 36
    end: 42
    closed: true
  left_eye:
    start: 42
    end: 48
    closed: true
  mouth_outer:
    start: 48
