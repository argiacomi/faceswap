# Canonical Faceswap/iBUG 68-point landmark schema.
#
# Coordinates are 2D image-space points in x/y order. Part names follow
# Faceswap's subject-relative convention: "left" and "right" describe the face,
# not the viewer. In normal image coordinates x increases left-to-right.
name: ibug_68
schema: 2d_68
points: 68
dimensions: 2
coordinate_order:
  - x
  - y
index_base: 0
source: Faceswap LM_2D_68 / iBUG 68 ordering
